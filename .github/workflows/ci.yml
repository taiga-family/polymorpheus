name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: taiga-family/ci/actions/setup/variables@a6230c2ffdf53253580ec058dd4faccdb01ac85a # v2.4.0
      - uses: taiga-family/ci/actions/setup/node@a6230c2ffdf53253580ec058dd4faccdb01ac85a # v2.4.0

      - run: |
          if [[ "${{ env.SUPPORT_AUTO_PUSH }}" == "true" ]]; then
              npm run prettier -- --write
              npm run stylelint -- --fix
              npm run lint -- --fix
          else
              npm run prettier -- --check
              npm run stylelint
              npm run lint
          fi

      - run: npm run cspell
      - run: npx nx build demo
      - run: npx nx build ng-polymorpheus
      - run: npx nx test ng-polymorpheus
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
      - uses: taiga-family/ci/actions/auto/push@a6230c2ffdf53253580ec058dd4faccdb01ac85a # v2.4.0
        with:
          token: ${{ secrets.TAIGA_FAMILY_BOT_PAT }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
